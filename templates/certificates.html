<!DOCTYPE html>
<html>
<head>
    <title>Certificates</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card-box{
            border-radius:15px;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <h2 class="mb-4">🏆 Certificates</h2>

    <a href="/dashboard" class="btn btn-secondary mb-3">
        ← Back to Dashboard
    </a>

    <!-- Add Certificate -->

    <div class="card card-box shadow p-4 mb-4">

        <h4>Add Certificate</h4>

        <form method="POST">

            <input
                type="text"
                name="certificate_name"
                class="form-control mt-2"
                placeholder="Certificate Name"
                required
            >

            <input
                type="text"
                name="organization"
                class="form-control mt-2"
                placeholder="Organization"
                required
            >

            <input
                type="date"
                name="issue_date"
                class="form-control mt-2"
                required
            >

            <input
                type="url"
                name="certificate_link"
                class="form-control mt-2"
                placeholder="Certificate Link"
            >

            <button class="btn btn-warning mt-3">
                Add Certificate
            </button>

        </form>

    </div>

    <!-- Certificate List -->

    <div class="card card-box shadow p-4">

        <h4>Your Certificates</h4>

        <table class="table table-bordered table-hover mt-3">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Certificate</th>
                    <th>Organization</th>
                    <th>Date</th>
                    <th>Link</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

                {% for c in certificates %}

                <tr>

                    <td>{{ c[0] }}</td>
                    <td>{{ c[2] }}</td>
                    <td>{{ c[3] }}</td>
                    <td>{{ c[4] }}</td>

                    <td>
                        {% if c[5] %}
                        <a href="{{ c[5] }}"
                           target="_blank"
                           class="btn btn-primary btn-sm">
                            View
                        </a>
                        {% else %}
                        No Link
                        {% endif %}
                    </td>

                   <td>
    <a href="/edit_certificate/{{ c[0] }}"
       class="btn btn-warning btn-sm">
       Edit
    </a>

    <a href="/delete_certificate/{{ c[0] }}"
       class="btn btn-danger btn-sm"
       onclick="return confirm('Delete this certificate?')">
       Delete
    </a>
</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
