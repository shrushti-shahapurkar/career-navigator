<!DOCTYPE html>
<html>
<head>
    <title>Edit Skill</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">
        <h3>Edit Skill</h3>

        <form method="POST">

            <input type="text" name="skill_name" value="{{ skill[2] }}" class="form-control mt-2">

            <select name="status" class="form-control mt-2">
                <option {% if skill[3]=='Beginner' %}selected{% endif %}>Beginner</option>
                <option {% if skill[3]=='Intermediate' %}selected{% endif %}>Intermediate</option>
                <option {% if skill[3]=='Advanced' %}selected{% endif %}>Advanced</option>
            </select>

            <button class="btn btn-success mt-3 w-100">Update</button>

        </form>

    </div>

</div>

</body>
</html>
