<!DOCTYPE html>
<html>
<head>
    <title>Edit Certificate</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2>✏️ Edit Certificate</h2>

        <form method="POST">

            <input
                type="text"
                name="certificate_name"
                class="form-control mt-3"
                value="{{ certificate[2] }}"
                required
            >

            <input
                type="text"
                name="organization"
                class="form-control mt-3"
                value="{{ certificate[3] }}"
                required
            >

            <input
                type="date"
                name="issue_date"
                class="form-control mt-3"
                value="{{ certificate[4] }}"
                required
            >

            <input
                type="url"
                name="certificate_link"
                class="form-control mt-3"
                value="{{ certificate[5] }}"
            >

            <button class="btn btn-success mt-3">
                Update Certificate
            </button>

            <a href="/certificates" class="btn btn-secondary mt-3">
                Cancel
            </a>

        </form>

    </div>

</div>

</body>
</html>
