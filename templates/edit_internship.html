<!DOCTYPE html>
<html>
<head>
    <title>Edit Internship</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2>✏️ Edit Internship</h2>

        <form method="POST">

            <input
                type="text"
                name="company"
                class="form-control mt-3"
                value="{{ internship[2] }}"
                required
            >

            <input
                type="text"
                name="role"
                class="form-control mt-3"
                value="{{ internship[3] }}"
                required
            >

            <input
                type="text"
                name="duration"
                class="form-control mt-3"
                value="{{ internship[4] }}"
                required
            >

            <button class="btn btn-success mt-3">
                Update Internship
            </button>

            <a href="/internships" class="btn btn-secondary mt-3">
                Cancel
            </a>

        </form>

    </div>

</div>

</body>
</html>
