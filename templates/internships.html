<!DOCTYPE html>
<html>
<head>
    <title>Internships</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            border-radius:15px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <h2 class="mb-4">💼 Internship Tracker</h2>

    <a href="/dashboard" class="btn btn-secondary mb-3">
        ← Back to Dashboard
    </a>

    <!-- Add Internship -->

    <div class="card shadow p-4 mb-4">

        <form method="POST">

            <input
                type="text"
                name="company"
                class="form-control mb-3"
                placeholder="Company Name"
                required>

            <input
                type="text"
                name="role"
                class="form-control mb-3"
                placeholder="Role"
                required>

            <input
                type="text"
                name="duration"
                class="form-control mb-3"
                placeholder="Duration"
                required>

            <button class="btn btn-primary">
                Add Internship
            </button>

        </form>

    </div>

    <!-- Internship List -->

    <div class="card shadow p-4">

        <table class="table table-bordered table-hover">

            <thead class="table-dark">
                <tr>
                    <th>Company</th>
                    <th>Role</th>
                    <th>Duration</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

            {% for internship in internships %}

                <tr>
                    <td>{{ internship[2] }}</td>
                    <td>{{ internship[3] }}</td>
                    <td>{{ internship[4] }}</td>

                    <td>
                        <a href="/edit_internship/{{ internship[0] }}"
                           class="btn btn-warning btn-sm">
                           Edit
                        </a>

                        <a href="/delete_internship/{{ internship[0] }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this internship?')">
                           Delete
                        </a>
                    </td>
                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
