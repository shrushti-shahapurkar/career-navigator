<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Career Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef2f7;
        }

        .card {
            border-radius: 15px;
        }

        .skill-box {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand">Career Navigator</a>
    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container mt-4">

    <div class="row">

        <!-- ADD SKILL -->
        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h4>Add Skill</h4>

                <form method="POST">
                    <input type="text" name="skill_name" class="form-control mt-2" placeholder="Skill Name" required>

                    <select name="status" class="form-control mt-2">
                        <option>Beginner</option>
                        <option>Intermediate</option>
                        <option>Advanced</option>
                    </select>

                    <button class="btn btn-primary w-100 mt-3">Add</button>
                </form>
            </div>
        </div>

        <!-- SKILL LIST -->
        <div class="col-md-8">
            <div class="card p-3 shadow">
                <h4>My Skills</h4>

                {% if skills %}
                    {% for skill in skills %}

                        <div class="skill-box">

                            <div class="skill-header">
                                <div>
                                    <strong>{{ skill[2] }}</strong>
                                    <span class="text-muted">({{ skill[3] }})</span>
                                </div>

                                <div>
                                    <a href="/edit_skill/{{ skill[0] }}" class="btn btn-sm btn-warning">Edit</a>
                                    <a href="/delete_skill/{{ skill[0] }}" class="btn btn-sm btn-danger">Delete</a>
                                </div>
                            </div>

                            <!-- Progress bar -->
                            <div class="progress mt-2" style="height: 8px;">
                                {% if skill[3] == 'Beginner' %}
                                    <div class="progress-bar bg-danger" style="width: 30%"></div>

                                {% elif skill[3] == 'Intermediate' %}
                                    <div class="progress-bar bg-warning" style="width: 60%"></div>

                                {% else %}
                                    <div class="progress-bar bg-success" style="width: 90%"></div>
                                {% endif %}
                            </div>

                        </div>

                    {% endfor %}
                {% else %}
                    <p class="text-muted">No skills added yet 🚀</p>
                {% endif %}

            </div>
        </div>

    </div>

</div>

</body>
</html>
